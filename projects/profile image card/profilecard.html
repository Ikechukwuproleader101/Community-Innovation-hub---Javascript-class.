<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile card</title>
    <link rel="stylesheet" href="profilecard.css" />
    <script type="module" src="profilecard.js" defer></script>
  </head>
      <body>
        <div class="container">
          <div class="form-card">
            <div class="banner"></div>

            <div class="profile-pic" id="profileblob">
                <img id="profilepic" src="" alt="">
            </div>
            <input type="file" id="choosepic" accept="image/*">
            <div class="form-content">
              <div class="title">
                <h1>Profile Registration</h1>
                <p>Create your professional profile</p>
              </div>

              <form>
                <div class="form-grid">
                  <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" />
                  </div>

                  <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" />
                  </div>

                  <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" />
                  </div>  

                  <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" />
                  </div>

                  <div class="input-group">
                    <label>Gender</label>
                    <select id="gender">
                      <option>Select Gender</option>
                      <option>Male</option>
                      <option>Female</option>
                      <option>Other</option>
                    </select>
                  </div>

                  <div class="input-group">
                    <label>Country</label>
                    <input type="text" id="country" />
                  </div>

                  <div class="input-group">
                    <label>Occupation</label>
                    <input type="text" id="occupation" />
                  </div>

                  <div class="input-group">
                    <label>Profile Picture URL</label>
                    <input type="text" id="image" />
                  </div>

                  <div class="input-group bio">
                    <label>Bio / About Me</label>
                    <textarea id="bio"></textarea>
                  </div>
                </div>

                <div class="buttons">
                  <button type="submit" class="register-btn"> 
                    <a href="profile page.html">Register Profile</a>
                  </button>

                  <button type="reset" class="reset-btn">Reset Form</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </body>
    </html>
  </body>
</html>
