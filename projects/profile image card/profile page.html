<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../profile image card/profilecard.css">
    <script type="module" src="profile page.js"></script>
</head>
<body>

<div class="profile-container">

    <div class="profile-card">

        <!-- COVER -->
        <div class="cover-banner"></div>
        <!-- PROFILE HEADER -->
        <div class="profile-header">

            <img src="" alt="" id="profileImage" class="profile-image">

            <div class="profile-main">

                <h1 id="fullName" class="profile-name"></h1>

                <p id="occupation" class="profile-role"></p>

                <p id="country" class="profile-location"></p>

                <div class="action-buttons">
                    <button class="connect-btn">Connect</button>
                    <button class="message-btn">Message</button>
                </div>

            </div>

        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="stat-box">
                <div class="stat-number" id="projectsCount"></div>
                <div class="stat-label">Projects</div>
            </div>

            <div class="stat-box">
                <div class="stat-number" id="experienceYears"></div>
                <div class="stat-label">Years Experience</div>
            </div>

            <div class="stat-box">
                <div class="stat-number" id="connections"></div>
                <div class="stat-label">Connections</div>
            </div>

            <div class="stat-box">
                <div class="stat-number" id="certificates"></div>
                <div class="stat-label">Certificates</div>
            </div>

        </div>

        <!-- CONTENT -->
        <div class="profile-content">

            <!-- LEFT SIDE -->

            <div>

                <div class="section">

                    <h2>About</h2>

                    <p id="bio" class="bio-text"></p>

                </div>

                <div class="section">

                    <h2>Personal Information</h2>

                    <div class="info-row">
                        <div class="info-title">Email</div>
                        <div id="email" class="info-value"></div>
                    </div>

                    <div class="info-row">
                        <div class="info-title">Phone Number</div>
                        <div id="phone" class="info-value"></div>
                    </div>

                    <div class="info-row">
                        <div class="info-title">Gender</div>
                        <div id="gender" class="info-value"></div>
                    </div>

                    <div class="info-row">
                        <div class="info-title">Date of Birth</div>
                        <div id="dob" class="info-value"></div>
                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div>

                <div class="section">

                    <h2>Skills</h2>

                    <div class="skills" id="skillsContainer">

                        <!-- JS inserts skills here -->

                    </div>

                </div>

                <div class="section">

                    <h2>Projects</h2>

                    <div id="projectsContainer">

                        <!-- JS inserts project cards here -->

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
</body>
</html>
